<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB 得意ヒーロー登録</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg:#0d0f1a;--surface:#141828;--card:#1a1f35;--border:#2a3160;
    --gold:#c9a84c;--gold-dim:#7a5f26;--teal:#00d4c8;--teal-dim:#004f4b;
    --text:#e8eaf0;--muted:#6b7399;--danger:#e05555;
    --lane-roam:#a0b4d4;--lane-exp:#d47c3a;--lane-jg:#7ab86a;
    --lane-mid:#5cb8e4;--lane-gold:#e4c05c;--lane-practice:#e88cc8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding:24px 16px 48px;}
  header{text-align:center;margin-bottom:32px;}
  header .emblem{width:56px;height:56px;margin:0 auto 12px;background:radial-gradient(circle,var(--gold) 0%,#5a3e10 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 24px rgba(201,168,76,0.4);}
  header h1{font-family:'Cinzel',serif;font-size:clamp(18px,4vw,26px);font-weight:900;letter-spacing:.05em;color:var(--gold);text-shadow:0 0 20px rgba(201,168,76,.5);}
  header p{margin-top:6px;font-size:13px;color:var(--muted);}
  .name-section{max-width:640px;margin:0 auto 28px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;}
  .name-section label{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;color:var(--gold);}
  .name-section input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;padding:9px 12px;outline:none;transition:border-color .2s;}
  .name-section input:focus{border-color:var(--gold);}
  .name-section input::placeholder{color:var(--muted);}
  .section-title{max-width:900px;margin:0 auto 12px;font-family:'Cinzel',serif;font-size:13px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;padding:0 4px;}
  .roles-grid{max-width:900px;margin:0 auto 28px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
  .role-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .role-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);}
  .role-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .role-name{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
  .role-count{margin-left:auto;font-size:11px;color:var(--muted);}
  .role-search{padding:8px 10px;border-bottom:1px solid var(--border);}
  .role-search input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;padding:5px 9px;outline:none;}
  .role-search input:focus{border-color:var(--gold-dim);}
  .role-search input::placeholder{color:var(--muted);}
  .hero-list{padding:10px;max-height:200px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start;}
  .hero-list::-webkit-scrollbar{width:4px;}
  .hero-list::-webkit-scrollbar-track{background:transparent;}
  .hero-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .hero-chip{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;white-space:nowrap;}
  .hero-chip:hover{border-color:var(--gold-dim);color:var(--text);}
  .hero-chip.selected{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);font-weight:600;}
  .hero-chip.hidden{display:none;}
  /* 練習中 */
  .practice-section{max-width:900px;margin:0 auto 28px;}
  .practice-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .practice-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);}
  .practice-body{padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:600px){.practice-body{grid-template-columns:1fr;}}
  .practice-col-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--lane-practice);margin-bottom:8px;}
  .practice-role-list{display:flex;flex-direction:column;gap:6px;}
  .practice-role-row{display:flex;align-items:center;gap:6px;}
  .p-role-btn{font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:.05em;min-width:60px;text-align:center;}
  .p-role-btn:hover{border-color:var(--lane-practice);color:var(--lane-practice);}
  .p-role-btn.active{background:#4a1f40;border-color:var(--lane-practice);color:var(--lane-practice);}
  .role-hero-chips{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
  .practice-chip{font-size:11px;padding:2px 8px;border-radius:20px;background:#4a1f40;border:1px solid var(--lane-practice);color:var(--lane-practice);cursor:pointer;white-space:nowrap;font-weight:600;}
  .practice-chip:hover{opacity:.7;}
  .practice-search-wrap{display:flex;flex-direction:column;}
  .practice-search input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:7px 11px;outline:none;transition:border-color .2s;margin-bottom:8px;}
  .practice-search input:focus{border-color:var(--lane-practice);}
  .practice-search input::placeholder{color:var(--muted);}
  .practice-results{display:flex;flex-wrap:wrap;gap:5px;max-height:160px;overflow-y:auto;}
  .practice-results::-webkit-scrollbar{width:4px;}
  .practice-results::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  /* preview */
  .preview-section{max-width:640px;margin:0 auto 20px;}
  .preview-section h2{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
  .preview-box{background:#36393f;border-radius:8px;padding:14px 16px;font-family:'Inter',sans-serif;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word;min-height:60px;border-left:4px solid var(--gold);color:#dcddde;}
  .preview-empty{color:var(--muted);font-style:italic;font-size:13px;}
  .actions{max-width:640px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;}
  .btn-post{flex:1;background:linear-gradient(135deg,#b8860b,var(--gold));border:none;border-radius:8px;color:#0d0f1a;font-size:14px;font-weight:700;padding:12px 20px;cursor:pointer;letter-spacing:.05em;transition:opacity .2s,transform .1s;font-family:'Cinzel',serif;}
  .btn-post:hover{opacity:.9;transform:translateY(-1px);}
  .btn-post:active{transform:translateY(0);}
  .btn-post:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .btn-clear{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;padding:12px 16px;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn-clear:hover{border-color:var(--danger);color:var(--danger);}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;transition:transform .3s ease;pointer-events:none;z-index:99;}
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast.success{border-color:var(--teal);color:var(--teal);}
  #toast.error{border-color:var(--danger);color:var(--danger);}
  .c-roam{color:var(--lane-roam)}.c-exp{color:var(--lane-exp)}.c-jg{color:var(--lane-jg)}.c-mid{color:var(--lane-mid)}.c-gold{color:var(--lane-gold)}
  .d-roam{background:var(--lane-roam)}.d-exp{background:var(--lane-exp)}.d-jg{background:var(--lane-jg)}.d-mid{background:var(--lane-mid)}.d-gold{background:var(--lane-gold)}
</style>
</head>
<body>
<header>
  <div class="emblem">⚔️</div>
  <h1>HERO REGISTRY</h1>
  <p>得意ヒーローをレーン別に選んでDiscordに投稿する</p>
</header>

<div class="name-section">
  <label>プレイヤー名</label>
  <input type="text" id="playerName" placeholder="例：ロロ" oninput="updatePreview()">
</div>

<div class="section-title">⚔️ 得意ヒーロー</div>
<div class="roles-grid" id="rolesGrid"></div>

<div class="section-title">🌱 練習中</div>
<div class="practice-section">
  <div class="practice-panel">
    <div class="practice-header">
      <span class="role-dot" style="background:var(--lane-practice)"></span>
      <span class="role-name" style="color:var(--lane-practice)">🌱 練習中</span>
    </div>
    <div class="practice-body">
      <div>
        <div class="practice-col-label">登録済み</div>
        <div class="practice-role-list" id="practiceRoleList"></div>
      </div>
      <div class="practice-search-wrap">
        <div class="practice-col-label">レーンを選んでヒーローを検索</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;" id="practiceRoleBtns"></div>
        <div class="practice-search">
          <input type="text" id="practiceSearch" placeholder="ヒーロー名を入力…" oninput="onPracticeSearch(this.value)" autocomplete="off">
        </div>
        <div class="practice-results" id="practiceResults"></div>
      </div>
    </div>
  </div>
</div>

<div class="preview-section">
  <h2>投稿プレビュー</h2>
  <div class="preview-box" id="previewBox"><span class="preview-empty">ヒーローを選ぶとプレビューが表示されます</span></div>
</div>
<div class="actions">
  <button class="btn-post" id="postBtn" onclick="postToDiscord()">⚔️ Discordに投稿</button>
  <button class="btn-clear" onclick="clearAll()">クリア</button>
</div>
<div id="toast"></div>

<script>
const LANES=[
  {id:"roam",label:"Roam",emoji:"🌀",
   heroes:["ハカート","セリナ","カティタ","マチルダ","カレード","ヒルダ","フォヴィウス","シルバンナ","アテラス","カーミラ","ガイ","ガトートカチャ","ガレック","クッフラー","グルー","ジェイソン","チップ","ティグラル","ヒロス","フランコ","ベレリック","ミノタウル","ロイン","玄覇","カチャ","マイシータール","アンジェラ","ラファエル","エスタス","ディガー","ファラミス"]},
  {id:"exp",label:"Exp",emoji:"⚔️",
   heroes:["アルカード","アーロット","ジュリアン","ディアス","バラッツ","パキート","ベラ","子龍","寅（イン）","粛遊","ゴセン","アウルス","アルゴス","アルダス","アルファ","イーディス","ウラノス","エスメラルダ","エックス","カレード","グィネヴィア","シュウ","シルバンナ","シーシー","ソラ","ゾン","ディスラー","デームス","バターン","バルモンド","ヒルダ","フォヴィウス","フレイヤ","フレッドリン","ベイン","マーシャ","マーティス","メタルヘッド","ラプラプ","ルビー","ルーカス","レオモルド","悟空","ボボル&クバ","マイシータール","カチャ"]},
  {id:"jg",label:"JG",emoji:"🌿",
   heroes:["アモン","アルカード","アーロット","イスンシン","カリナ","ゴセン","ジュリアン","ジョイ","セイバー","セリナ","ディアス","ナタリア","ノーラン","ハカート","ハーリー","バラッツ","パキート","ヒララ","ファニー","ベラ","マチルダ","ランスロット","リン","ローイー","半蔵","子龍","寅（イン）","粛遊","隼","バルモンド","エスメラルダ","ベイン","サイクロプス","ニュート","ロジャー"]},
  {id:"mid",label:"Mid",emoji:"🔮",
   heroes:["カティタ","ゴセン","ジョイ","セリナ","ハーリー","ローイー","ベイン","ディガー","ナナ","ファラミス","アリス","イヴ","エウドラ","オデット","オーロラ","カグラ","グールド","サイクロプス","サナ","ザスク","ザビエル","ジミー","セシリオン","ノヴァリア","ハリス","バレンティナ","ファーサ","リリア","ヴァリル","ヴェル","嫦娥","星夢","燭心","則天"]},
  {id:"gold",label:"Gold",emoji:"🏹",
   heroes:["イスンシン","イーディス","ボボル&クバ","ジミー","ハリス","エレシル","キャリー","クラウド","クリント","グレンジャー","ニュート","ハナビ","ビアトリクス","ブルーノ","ブロディ","マイヤ","メリッサ","モスコブ","ライラ","ラズリー","ロジャー","琥珀"]}
];

const ALL_HEROES=["アウルス","アテラス","アモン","アリス","アルカード","アルゴス","アルダス","アルファ","アンジェラ","アーロット","イスンシン","イヴ","イーディス","ウラノス","エウドラ","エスタス","エスメラルダ","エックス","エレシル","オデット","オーロラ","カグラ","カチャ","カティタ","カリナ","カレード","カーミラ","ガイ","ガトートカチャ","ガレック","キャリー","クッフラー","クラウド","クリント","グィネヴィア","グルー","グレンジャー","グールド","ゴセン","サイクロプス","サナ","ザスク","ザビエル","シュウ","シルバンナ","シーシー","ジェイソン","ジミー","ジュリアン","ジョイ","セイバー","セシリオン","セリナ","ソラ","ゾン","チップ","ティグラル","ディアス","ディガー","ディスラー","デームス","ナタリア","ナナ","ニュート","ノヴァリア","ノーラン","ハカート","ハナビ","ハリス","ハーリー","バターン","バラッツ","バルモンド","バレンティナ","パキート","ヒララ","ヒルダ","ヒロス","ビアトリクス","ファニー","ファラミス","ファーサ","フォヴィウス","フランコ","フレイヤ","フレッドリン","フローラ","ブルーノ","ブロディ","ベイン","ベラ","ベレリック","ボボル&クバ","マイシータール","マイヤ","マチルダ","マーシャ","マーティス","ミノタウル","メタルヘッド","メリッサ","モスコブ","ライラ","ラズリー","ラファエル","ラプラプ","ランスロット","リリア","リン","ルビー","ルーカス","レオモルド","ロイン","ロジャー","ローイー","ヴァリル","ヴェル","半蔵","嫦娥","子龍","寅（イン）","悟空","星夢","燭心","玄覇","琥珀","粛遊","隼","則天","イクシア"];

LANES.forEach(r=>{r.heroes=[...new Set(r.heroes)];});
const selected={};
LANES.forEach(r=>{selected[r.id]=new Set();});

const PRACTICE_LANES=[
  {id:"exp",label:"EXP"},{id:"mid",label:"MID"},{id:"jg",label:"JG"},
  {id:"roam",label:"ROAM"},{id:"gold",label:"GOLD"}
];
const practiceSelected={};
PRACTICE_LANES.forEach(r=>{practiceSelected[r.id]=new Set();});
let activePracticeRole=null;

const YOMI={"子龍":"しりゅう","隼":"はやぶさ","悟空":"ごくう","嫦娥":"じょうが","星夢":"せいむ","半蔵":"はんぞう","玄覇":"げんは","琥珀":"こはく","粛遊":"すよう","燭心":"しょくしん","寅（イン）":"とらいん","ボボル&クバ":"ぼぼるくば","則天":"そくてん"};
function toHira(s){return s.replace(/[\u30A1-\u30F6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));}
function toKata(s){return s.replace(/[\u3041-\u3096]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60));}
function matchHero(hero,q){
  const qH=toHira(q),qK=toKata(qH),n=hero.toLowerCase(),nH=toHira(n),y=YOMI[hero]||"";
  return n.includes(q)||nH.includes(qH)||toKata(nH).includes(qK)||y.includes(qH)||toKata(y).includes(qK);
}

// ── 得意ヒーロー ──
function buildLanes(){
  const grid=document.getElementById('rolesGrid');
  LANES.forEach(lane=>{
    const panel=document.createElement('div');
    panel.className='role-panel';
    panel.innerHTML=`
      <div class="role-header">
        <span class="role-dot d-${lane.id}"></span>
        <span class="role-name c-${lane.id}">${lane.emoji} ${lane.label}</span>
        <span class="role-count" id="count-${lane.id}">0 / ${lane.heroes.length}</span>
      </div>
      <div class="role-search">
        <input type="text" id="search-${lane.id}" placeholder="ヒーローを検索…" oninput="onLaneSearch('${lane.id}',this.value)">
      </div>
      <div class="hero-list" id="list-${lane.id}"></div>`;
    grid.appendChild(panel);
    const list=panel.querySelector(`#list-${lane.id}`);
    lane.heroes.forEach(hero=>list.appendChild(makeChip(hero,lane.id,false)));
  });
}

function makeChip(hero,laneId,isExtra){
  const chip=document.createElement('span');
  chip.className='hero-chip'+(isExtra?' extra-chip':'');
  chip.dataset.hero=hero;
  if(selected[laneId]&&selected[laneId].has(hero))chip.classList.add('selected');
  chip.textContent=hero;
  chip.onclick=()=>{
    toggleHero(laneId,hero,chip);
    const si=document.getElementById(`search-${laneId}`);
    if(si&&si.value){si.value='';clearExtraChips(laneId);filterHeroes(laneId,'');}
  };
  return chip;
}

function onLaneSearch(laneId,value){
  if(!value)clearExtraChips(laneId);
  filterHeroes(laneId,value);
}

function filterHeroes(laneId,query){
  const list=document.getElementById(`list-${laneId}`);
  if(!query){list.querySelectorAll('.hero-chip').forEach(c=>c.classList.remove('hidden'));return;}
  const q=query.toLowerCase();
  const shown=new Set([...list.querySelectorAll('.hero-chip')].map(c=>c.dataset.hero));
  list.querySelectorAll('.hero-chip').forEach(chip=>chip.classList.toggle('hidden',!matchHero(chip.dataset.hero,q)));
  ALL_HEROES.forEach(hero=>{
    if(matchHero(hero,q)&&!shown.has(hero)){
      list.appendChild(makeChip(hero,laneId,true));
      shown.add(hero);
    }
  });
}

function clearExtraChips(laneId){
  document.querySelectorAll(`#list-${laneId} .extra-chip`).forEach(c=>c.remove());
}

function toggleHero(laneId,hero,chip){
  if(selected[laneId].has(hero)){selected[laneId].delete(hero);chip.classList.remove('selected');}
  else{selected[laneId].add(hero);chip.classList.add('selected');}
  const lane=LANES.find(r=>r.id===laneId);
  document.getElementById(`count-${laneId}`).textContent=`${selected[laneId].size} / ${lane.heroes.length}`;
  updatePreview();
}

// ── 練習中 ──
function buildPractice(){
  const btns=document.getElementById('practiceRoleBtns');
  PRACTICE_LANES.forEach(r=>{
    const btn=document.createElement('button');
    btn.className='p-role-btn';
    btn.textContent=r.label;
    btn.id=`pbtn-${r.id}`;
    btn.onclick=()=>{
      activePracticeRole=r.id;
      document.querySelectorAll('.p-role-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('practiceSearch').value='';
      document.getElementById('practiceResults').innerHTML='';
    };
    btns.appendChild(btn);
  });
  renderPracticeRoleList();
}

function onPracticeSearch(value){
  const results=document.getElementById('practiceResults');
  results.innerHTML='';
  if(!value.trim()||!activePracticeRole)return;
  const q=value.toLowerCase();
  ALL_HEROES.filter(h=>matchHero(h,q)).slice(0,40).forEach(hero=>{
    const chip=document.createElement('span');
    chip.className='hero-chip';
    if(practiceSelected[activePracticeRole]&&practiceSelected[activePracticeRole].has(hero))chip.classList.add('selected');
    chip.textContent=hero;
    chip.onclick=()=>{
      togglePracticeHero(activePracticeRole,hero,chip);
      document.getElementById('practiceSearch').value='';
      results.innerHTML='';
    };
    results.appendChild(chip);
  });
}

function togglePracticeHero(roleId,hero,chip){
  if(practiceSelected[roleId].has(hero)){practiceSelected[roleId].delete(hero);chip.classList.remove('selected');}
  else{practiceSelected[roleId].add(hero);chip.classList.add('selected');}
  renderPracticeRoleList();
  updatePreview();
}

function renderPracticeRoleList(){
  const list=document.getElementById('practiceRoleList');
  list.innerHTML='';
  PRACTICE_LANES.forEach(r=>{
    const heroes=[...practiceSelected[r.id]];
    const row=document.createElement('div');
    row.className='practice-role-row';
    const lbl=document.createElement('span');
    lbl.className='p-role-btn';
    lbl.style.cursor='default';
    lbl.textContent=r.label;
    if(heroes.length>0){lbl.style.borderColor='var(--lane-practice)';lbl.style.color='var(--lane-practice)';}
    row.appendChild(lbl);
    const chips=document.createElement('div');
    chips.className='role-hero-chips';
    heroes.forEach(hero=>{
      const chip=document.createElement('span');
      chip.className='practice-chip';
      chip.textContent=hero;
      chip.title='クリックで解除';
      chip.onclick=()=>{practiceSelected[r.id].delete(hero);renderPracticeRoleList();updatePreview();};
      chips.appendChild(chip);
    });
    if(heroes.length===0){
      const empty=document.createElement('span');
      empty.style.cssText='font-size:11px;color:var(--muted)';
      empty.textContent='なし';
      chips.appendChild(empty);
    }
    row.appendChild(chips);
    list.appendChild(row);
  });
}

// ── プレビュー＆投稿 ──
const LANE_LABELS={roam:"🌀 Roam",exp:"⚔️ Exp",jg:"🌿 JG",mid:"🔮 Mid",gold:"🏹 Gold"};

function buildMessage(){
  const name=document.getElementById('playerName').value.trim();
  const heroLines=[];
  LANES.forEach(lane=>{
    if(selected[lane.id].size>0)heroLines.push(`${LANE_LABELS[lane.id]}\n　${[...selected[lane.id]].join(', ')}`);
  });
  const practiceLines=[];
  PRACTICE_LANES.forEach(r=>{
    if(practiceSelected[r.id].size>0)practiceLines.push(`🌱 ${r.label}\n　${[...practiceSelected[r.id]].join(', ')}`);
  });
  if(heroLines.length===0&&practiceLines.length===0)return null;
  const lines=[];
  lines.push(name?`# ${name}`:'');
  if(heroLines.length>0){lines.push('【得意ヒーロー】');heroLines.forEach(l=>lines.push(l));}
  if(practiceLines.length>0){
    if(heroLines.length>0)lines.push('');
    lines.push('【練習中】');
    practiceLines.forEach(l=>lines.push(l));
  }
  return lines.join('\n');
}

function updatePreview(){
  const box=document.getElementById('previewBox');
  const msg=buildMessage();
  if(msg){box.innerHTML='';box.textContent=msg;}
  else{box.innerHTML='<span class="preview-empty">ヒーローを選ぶとプレビューが表示されます</span>';}
  document.getElementById('postBtn').disabled=!msg;
}

async function postToDiscord(){
  const url='https://discord.com/api/webhooks/1516993952736215202/XkchAQu9Clt0bT4GgiYDlltqnEacdlh2ELrJW2FLI0WrxC-lMv6H9LkibJtyOVhDP3Nc';
  const msg=buildMessage();
  if(!msg){showToast('ヒーローを選択してください','error');return;}
  const btn=document.getElementById('postBtn');
  btn.disabled=true;btn.textContent='送信中…';
  try{
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:msg})});
    if(res.ok||res.status===204)showToast('✅ Discordに投稿しました！','success');
    else showToast(`エラー: ${res.status}`,'error');
  }catch(e){showToast('通信エラー','error');}
  finally{btn.disabled=false;btn.textContent='⚔️ Discordに投稿';updatePreview();}
}

function clearAll(){
  LANES.forEach(lane=>{
    selected[lane.id].clear();
    document.querySelectorAll(`#list-${lane.id} .hero-chip`).forEach(c=>c.classList.remove('selected'));
    document.getElementById(`count-${lane.id}`).textContent=`0 / ${lane.heroes.length}`;
    const si=document.getElementById(`search-${lane.id}`);
    if(si)si.value='';
    clearExtraChips(lane.id);
  });
  PRACTICE_LANES.forEach(r=>practiceSelected[r.id].clear());
  activePracticeRole=null;
  document.querySelectorAll('.p-role-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('practiceSearch').value='';
  document.getElementById('practiceResults').innerHTML='';
  renderPracticeRoleList();
  document.getElementById('playerName').value='';
  updatePreview();
}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`show ${type}`;
  setTimeout(()=>{t.className=type;},3000);
}

buildLanes();
buildPractice();
updatePreview();
</script>
